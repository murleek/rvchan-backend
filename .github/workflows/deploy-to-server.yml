name: Deploy backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '**/*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build \
                      --build-arg COMMIT_SHA=${{ github.sha }} \
                      -t backend .

      - name: Export Docker image to tar
        run: |
          docker save backend -o backend.tar

      - name: Ensure that folder path exists
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_DEPLOY_KEY }}
          script: |
            mkdir -p /var/www/api/

      - name: Copy files via SSH
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_DEPLOY_KEY }}
          source: 'backend.tar,docker-compose.yml,tsconfig*'
          target: /var/www/api

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.4
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_DEPLOY_KEY }}
          script: |
            cd /var/www/api
            docker compose --env-file .env.prod down
            docker rmi backend:latest || true
            docker load -i backend.tar 
            docker compose --profile prod --env-file .env.prod up -d --force-recreate
            docker image prune -f
            rm backend.tar

      - name: Notify in telegram on success
        if: success()
        run: |
          run_id=${{ github.run_id }}

          log_url="https://github.com/${{ github.repository }}/actions/runs/$run_id"

          message="✅ rvchan backend deployment successful\n\n${log_url}"

          curl -s -X POST \
            https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="${message}"

      - name: Notify in telegram on failure
        if: failure()
        run: |
          run_id=${{ github.run_id }}

          log_url="https://github.com/${{ github.repository }}/actions/runs/$run_id"

          message="❌ failed to deploy rvchan backend!\n\n${log_url}"

          curl -s -X POST \
            https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="${message}"
