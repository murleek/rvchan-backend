version: '3.9'

services:
  api:
    container_name: rv-back
    image: backend:latest
    profiles: ['prod']
    env_file:
      - .env.prod

    depends_on:
      - postgres
      - redis

    ports:
      - '3000:3000'

    restart: always

    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.rvchanbackend.rule=Host(`api.rvchan.pp.ua`)'
      - 'traefik.http.routers.rvchanbackend.entrypoints=websecure'
      - 'traefik.http.routers.rvchanbackend.service=rvchanbackend'
      - 'traefik.http.services.rvchanbackend.loadbalancer.server.port=3000'
      - 'traefik.http.routers.rvchanbackend.tls=true'
      - 'traefik.http.routers.rvchanbackend.tls.certresolver=cf'

  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rv-back-dev
    profiles: ['dev']
    command: sh -c "yarn install --frozen-lockfile && yarn start:dev"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - '3001:3000'

  postgres:
    image: postgres:18-alpine
    container_name: rv-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    container_name: rv-redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly no
      --save ""
    ports:
      - '6379:6379'
    restart: always

volumes:
  postgres_data:
