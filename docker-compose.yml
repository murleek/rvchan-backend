version: '3.9'

services:
  api:
    container_name: nest_prod_api
    profiles: ['prod']
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production.local
    depends_on:
      - postgres
      - redis
    ports:
      - '3000:3000'
    restart: always

  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nest_dev_api
    profiles: ['dev']
    command: sh -c "yarn install --frozen-lockfile && yarn start:dev"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - '3001:3000'

  postgres:
    image: postgres:18-alpine
    container_name: nest_postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:7-alpine
    container_name: nest_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly no
      --save ""
    ports:
      - '6379:6379'
    restart: always

volumes:
  postgres_data:
